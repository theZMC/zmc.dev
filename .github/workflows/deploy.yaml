name: Deploy to GitHub Pages
on:
  push:
    branches:
    - main
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: git checkout
      uses: actions/checkout@v4
    - name: install pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10
    - name: install packages
      shell: bash
      working-directory: .
      run: pnpm install
    # Build-time mermaid rendering (src/lib/diagrams) drives headless
    # chromium; runner images stopped pre-caching playwright browsers.
    # The version key comes from the pinned devDependency, and
    # `playwright install` skips the download when the cache restored it.
    - name: read playwright version
      id: playwright-version
      shell: bash
      run: echo "version=$(node -p "require('./package.json').devDependencies.playwright")" >> "$GITHUB_OUTPUT"
    - name: cache playwright chromium
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ steps.playwright-version.outputs.version }}
    - name: install playwright chromium
      shell: bash
      working-directory: .
      run: pnpm exec playwright install --with-deps chromium
    - name: build astro site
      shell: bash
      working-directory: .
      run: pnpm build
    - name: check social cards
      shell: bash
      working-directory: .
      run: pnpm check:cards
    - name: upload pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./dist/
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: deploy to github pages
      id: deployment
      uses: actions/deploy-pages@v4
