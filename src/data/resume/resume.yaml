# Site profile prose. Strings may carry inline HTML (rendered via set:html).
profile:
  lede: >-
    Software engineer by way of system administration — and before that,
    retail floors and field medicine. Automation and tooling are the passion;
    the goal is to <em>make my team's job easier today than it was
    yesterday.</em> Mostly self-taught, working with Linux daily since 2006,
    and a firm believer that the best solutions are built by communities.
  body:
    - >-
      Bash and Go are the languages I reach for most, but I'm always adding
      to the toolbox. Whether on a team or solo, I strive to leave things
      better than I found them.
    - >-
      Nine years in retail management taught me how to identify people's
      strengths and develop them — everyone has at least one. Six years as a
      combat medic in the Arkansas Army National Guard (honorably discharged
      2017) taught me leadership and teamwork under pressure.
    - >-
      I also teach frontend fundamentals at the Arkansas Coding Academy. Off
      the clock: tinkering with computers and electronics, my girlfriend, and
      our three dogs.

